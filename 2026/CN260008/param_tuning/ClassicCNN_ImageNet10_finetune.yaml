program: ClassicCNN_ImageNet10_finetune.py
method: grid
metric:
  goal: maximize
  name: eval/val_acc_epoch # 需与训练脚本中的指标名相同
parameters:
  lr:
    values: [0.0001, 0.0005, 0.001]
  batch_size:
    values: [32, 64]
  modelname:
    values: ['AlexNet', 'VGG16']
  finetune:
    values: ['all', 'classifier']
    
early_terminate:
  type: hyperband
  # 阶段轮次即 [min_iter, min_iter*eta, min_iter*(eta)**2,..]=[5, 15, 45]
  min_iter: 5
  eta: 3
command:
  - ${env}
  - python
  - ${program}
  - ${args}