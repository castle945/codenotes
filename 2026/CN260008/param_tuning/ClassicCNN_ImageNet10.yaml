program: ClassicCNN_ImageNet10.py
method: grid
metric:
  goal: maximize
  name: eval/val_acc_epoch # 需与训练脚本中的指标名相同
parameters:
  lr:
    values: [0.0005, 0.001, 0.0015]
  batch_size:
    values: [32, 64]
  init_weight:
    values: [True, False]
  use_bias:
    values: [True, False]
  epochs:
    value: 35 # 从 eval/val_acc_epoch 曲线可知 35 轮左右足够收敛
early_terminate:
  type: hyperband
  # 阶段轮次即 [min_iter, min_iter*eta, min_iter*(eta)**2,..]=[5, 15, 45]
  min_iter: 5
  eta: 3
command:
  - ${env}
  - python
  - ${program}
  - ${args}

