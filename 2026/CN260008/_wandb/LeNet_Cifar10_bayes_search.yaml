program: LeNet_Cifar10_wandb_sweep_cmd.py
method: bayes
metric:
  goal: maximize
  name: eval/val_acc_epoch # 需与训练脚本中的指标名相同
parameters:
  lr:
    distribution: uniform # 连续值范围的默认分布，即均匀分布
    min: 0.001            # 已根据 Grid Search 结果调整
    max: 0.015
  batch_size:
    # 量化对数均匀分布，即按步长为 q 均匀递增，int_uniform: 按 1 递增
    distribution: q_log_uniform_values
    q: 64
    min: 256
    max: 640
  epochs:
    distribution: q_log_uniform_values
    q: 5
    min: 20
    max: 35
  use_sigmoid:
    values: [True, False]
    
early_terminate:
  type: hyperband
  # 阶段轮次即 [min_iter, min_iter*eta, min_iter*(eta)**2,..]=[5, 15, 45]
  min_iter: 5
  eta: 3
command:
  - ${env}
  - python
  - ${program}
  - ${args}